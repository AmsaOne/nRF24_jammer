; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts = 
    scripts/copy_files.py
build_unflags = -std=gnu++11
lib_deps = 
    Update
    RF24
    NimBLE-Arduino
    Adafruit GFX Library
    Adafruit SSD1306
    Adafruit BusIO
    GyverButton
    EEPROM
    Wire
    SPI
    WiFi
    DNSServer
    WebServer

[env:128x32_Flexible]
build_src_filter = -<*> +<128x32_Flexible/>
build_flags = 
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x32_Flexible

[env:128x64_Flexible]
build_src_filter = -<*> +<128x64_Flexible/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x64_Flexible

; ============================================================================
; ESP32-S3 Super Mini variant (community port — AmsaOne fork)
; ----------------------------------------------------------------------------
; Native USB-CDC, FH4R2 / FN8 chip, no UART bridge. HSPI bus is remapped to
; SCK=12, MISO=13, MOSI=11 (free GPIOs on Super Mini, no flash conflict).
; CE/CSN pins are set at runtime via the web UI on first boot.
; The 128x64 source tree is reused; OLED stays optional (don't connect = headless).
; PSRAM (if present on FH4R2) is not required by the firmware.
; Build:  python -m platformio run -e esp32-s3-super-mini
; Upload: python -m platformio run -e esp32-s3-super-mini -t upload
; ============================================================================
[env:esp32-s3-super-mini]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.flash_size = 4MB
build_src_filter = -<*> +<128x64_Flexible/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x64_Flexible
    -DESP32_S3_SUPER_MINI
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_DFU_ON_BOOT=0
